name: Deploy function code

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC — no client secret stored in GitHub
  contents: read

env:
  FUNCTION_APP:   func-pfauto
  RESOURCE_GROUP: rg-portfolio-automation-prod
  STORAGE_ACCT:   stpfautoprod
  PACKAGE_BLOB:   https://stpfautoprod.blob.core.windows.net/deployment/func-pfauto.zip

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into .python_packages (Linux x64 wheels)
        run: |
          cd src
          python -m pip install --upgrade pip
          pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Build zip (code + bundled deps)
        run: |
          cd src
          zip -r ../func-pfauto.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude ".venv/*" \
            --exclude "local.settings.json"
          echo "Zip size: $(du -sh ../func-pfauto.zip | cut -f1)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload package to deployment blob
        run: |
          az storage blob upload \
            --account-name ${{ env.STORAGE_ACCT }} \
            --container-name deployment \
            --name func-pfauto.zip \
            --file func-pfauto.zip \
            --auth-mode login \
            --overwrite

      - name: Set WEBSITE_RUN_FROM_PACKAGE and restart
        run: |
          az functionapp config appsettings set \
            --name ${{ env.FUNCTION_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings "WEBSITE_RUN_FROM_PACKAGE=${{ env.PACKAGE_BLOB }}"
          az functionapp restart \
            --name ${{ env.FUNCTION_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }}
          echo "Deployed: ${{ env.PACKAGE_BLOB }}"
