name: Deploy function code

# Flex Consumption deployment.
# Identity-based one-deploy via `az functionapp deployment source config-zip`,
# which uploads the package to the deployment container declared in
# functionAppConfig.deployment.storage and triggers the host to swap.
#
# Wheels are still pre-bundled with manylinux2014 platform tags so the worker
# can import cryptography / pydantic-core etc. on the Flex Linux image.

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

# Serialize deploys. The Flex one-deploy (`az functionapp deployment source
# config-zip`) takes a host-side lock; two concurrent deploys collide with
# "another deployment is in progress" and BOTH fail. A duplicate push event (or
# two pushes in quick succession) otherwise races two deploys. Queue them instead
# of cancelling — never abort an in-flight deploy mid-upload.
concurrency:
  group: deploy-code
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC — no client secret stored in GitHub
  contents: read

env:
  FUNCTION_APP:   func-pfauto
  RESOURCE_GROUP: rg-portfolio-automation-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies into .python_packages (manylinux2014 wheels)
        run: |
          cd src
          python -m pip install --upgrade pip
          pip install \
            --target=".python_packages/lib/site-packages" \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --implementation cp \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt

      - name: Build zip (code + bundled deps)
        run: |
          cd src
          zip -r ../func-pfauto.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude ".venv/*" \
            --exclude "local.settings.json"
          echo "Zip size: $(du -sh ../func-pfauto.zip | cut -f1)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy package (Flex Consumption one-deploy)
        run: |
          az functionapp deployment source config-zip \
            --name ${{ env.FUNCTION_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src func-pfauto.zip \
            --build-remote false
          echo "Deployed func-pfauto.zip to ${{ env.FUNCTION_APP }} via Flex one-deploy"

      - name: Wire Event Grid subscription (post-deploy)
        # The blobs_extension system key is generated by the Functions runtime
        # when it first loads the extension bundle — i.e. after code deploy.
        # We delete + recreate the subscription here so it always has the
        # current key embedded in the webhook URL.
        run: |
          # Wait for the runtime to finish loading the new package.
          sleep 60

          BLOBS_KEY=$(az functionapp keys list \
            --name ${{ env.FUNCTION_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query systemKeys.blobs_extension -o tsv)

          if [ -z "$BLOBS_KEY" ]; then
            echo "ERROR: blobs_extension key not found — skipping EG subscription"
            exit 1
          fi

          # URL-encode the key (handles trailing == from base64)
          ENCODED_KEY=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$BLOBS_KEY', safe=''))")
          # functionName MUST be the fully-qualified "Host.Functions.<name>" form.
          # The bare "analyzer" form is accepted by the blobs webhook (HTTP 200)
          # but cannot be routed to the registered listener, so events are
          # silently dropped — the analyzer never fires. (Diagnosed 2026-06-09.)
          WEBHOOK_URL="https://${{ env.FUNCTION_APP }}.azurewebsites.net/runtime/webhooks/blobs?functionName=Host.Functions.analyzer&code=${ENCODED_KEY}"

          TOPIC_NAME="stpfautoprod-snapshots-topic"
          SUB_NAME="analyzer-on-snapshot"

          # Delete existing subscription if present (ignore errors if not found).
          az eventgrid system-topic event-subscription delete \
            --name "$SUB_NAME" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --system-topic-name "$TOPIC_NAME" \
            --yes 2>/dev/null || true

          # Small pause to let Azure propagate the delete.
          sleep 10

          az eventgrid system-topic event-subscription create \
            --name "$SUB_NAME" \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --system-topic-name "$TOPIC_NAME" \
            --endpoint "$WEBHOOK_URL" \
            --included-event-types Microsoft.Storage.BlobCreated \
            --subject-begins-with "/blobServices/default/containers/daily-snapshots/" \
            --subject-ends-with ".json" \
            --max-delivery-attempts 30 \
            --event-ttl 1440

          echo "Event Grid subscription '$SUB_NAME' wired to ${{ env.FUNCTION_APP }}"
