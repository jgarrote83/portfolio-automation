name: Deploy function code

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC — no client secret stored in GitHub
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build zip (code only — Oryx installs deps on Azure)
        run: |
          cd src
          zip -r ../func-pfauto.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude ".python_packages/*"
          echo "Zip size: $(du -sh ../func-pfauto.zip | cut -f1)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to func-pfauto (Oryx will pip-install requirements.txt)
        run: |
          az functionapp deployment source config-zip \
            --name func-pfauto \
            --resource-group rg-portfolio-automation-prod \
            --src func-pfauto.zip \
            --build-remote true \
            --timeout 300
