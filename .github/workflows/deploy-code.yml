name: Deploy function code

# Flex Consumption deployment.
# Identity-based one-deploy via `az functionapp deployment source config-zip`,
# which uploads the package to the deployment container declared in
# functionAppConfig.deployment.storage and triggers the host to swap.
#
# Wheels are still pre-bundled with manylinux2014 platform tags so the worker
# can import cryptography / pydantic-core etc. on the Flex Linux image.

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write   # OIDC — no client secret stored in GitHub
  contents: read

env:
  FUNCTION_APP:   func-pfauto
  RESOURCE_GROUP: rg-portfolio-automation-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies into .python_packages (manylinux2014 wheels)
        run: |
          cd src
          python -m pip install --upgrade pip
          pip install \
            --target=".python_packages/lib/site-packages" \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --implementation cp \
            --only-binary=:all: \
            --upgrade \
            -r requirements.txt

      - name: Build zip (code + bundled deps)
        run: |
          cd src
          zip -r ../func-pfauto.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude ".venv/*" \
            --exclude "local.settings.json"
          echo "Zip size: $(du -sh ../func-pfauto.zip | cut -f1)"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy package (Flex Consumption one-deploy)
        run: |
          az functionapp deployment source config-zip \
            --name ${{ env.FUNCTION_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --src func-pfauto.zip \
            --build-remote false
          echo "Deployed func-pfauto.zip to ${{ env.FUNCTION_APP }} via Flex one-deploy"
