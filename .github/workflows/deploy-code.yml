name: Deploy function code

on:
  push:
    branches: [master]
    paths:
      - 'src/**'        # code or config changed
  workflow_dispatch:    # manual trigger from GitHub UI

permissions:
  id-token: write   # required for OIDC — no client secret stored in GitHub
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to func-pfauto
        uses: Azure/functions-action@v1
        with:
          app-name: func-pfauto
          package: src
          scm-do-build-during-deployment: true   # Oryx installs requirements.txt on Azure Linux
