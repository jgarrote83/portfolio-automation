name: Deploy function code

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC — no client secret stored in GitHub
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/requirements.txt

      - name: Install dependencies into package dir
        run: |
          pip install \
            --target src/.python_packages/lib/site-packages \
            -r src/requirements.txt

      - name: Build zip
        run: |
          cd src
          zip -r ../func-pfauto.zip . \
            --exclude "**/__pycache__/*" \
            --exclude "**/*.pyc" \
            --exclude ".python_packages/*/tests/*"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to func-pfauto via Kudu zip deploy
        run: |
          az functionapp deployment source config-zip \
            --name func-pfauto \
            --resource-group rg-portfolio-automation-prod \
            --src func-pfauto.zip
