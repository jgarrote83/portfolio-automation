name: CI

# Lint + tests on every push/PR. The repo previously had NO CI gate, so syntax or
# logic errors only surfaced at deploy as a silent Python-worker import failure.
# This runs ruff + pytest so they fail fast here instead. Does not deploy.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt ruff pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        env:
          PYTHONPATH: src
        run: pytest -q
